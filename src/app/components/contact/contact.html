<section class="contact-card" id="contact">

  <h2 class="section-title">Contact Me</h2>

  <a [href]="'mailto:' + email + '?subject=' + subject" class="email-box">
    <div class="email-box__inner">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="20" height="16" x="2" y="4" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <span class="email-box__address">{{ email }}</span>
    </div>
  </a>

  <div class="contact-links">
    @for (link of links; track link.label) {
      <a [href]="link.href" target="_blank" class="contact-link">
        {{ link.label }}
      </a>
    }
  </div>

</section>
